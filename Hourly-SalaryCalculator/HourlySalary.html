<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hourly to Salary Calculator</title>
    <link rel="stylesheet" href="../Style.css">
</head>
<body>
    <div class="nav-header">
        <h1><a href="../index.html">Financial Calculators</a></h1>
    </div>
    <div class="container">
        <h1>Hourly to Salary Calculator</h1>

        <form id="salaryForm">
            <div class="form-group">
                <label for="hourlyWage">Hourly Wage ($):</label>
                <input type="number" id="hourlyWage" step="0.01" min="0" placeholder="25.00">
            </div>

            <div class="form-group">
                <label for="hoursPerWeek">Hours Worked Per Week:</label>
                <input type="number" id="hoursPerWeek" min="1" max="168" value="40">
            </div>

            <div class="form-group">
                <label for="weeksPerYear">Weeks Worked Per Year:</label>
                <input type="number" id="weeksPerYear" min="1" max="52" value="52">
            </div>

            <button type="submit">Calculate Salary</button>
        </form>

        <div id="results" class="results">
            <h2>Salary Breakdown</h2>
            <div class="result-row">
                <span>Annual Salary:</span>
                <span id="annualSalary">$0.00</span>
            </div>
            <div class="result-row">
                <span>Monthly Salary:</span>
                <span id="monthlySalary">$0.00</span>
            </div>
            <div class="result-row">
                <span>Biweekly Salary:</span>
                <span id="biweeklySalary">$0.00</span>
            </div>
            <div class="result-row">
                <span>Weekly Salary:</span>
                <span id="weeklySalary">$0.00</span>
            </div>
        </div>
    </div>

    <script type="module" src="HourlySalary.js"></script>
</body>
</html>
