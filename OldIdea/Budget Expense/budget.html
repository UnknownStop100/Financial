<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget / Expense Calculator</title>
    <link rel="stylesheet" href="../common.css">
    <style>
        .sidebar h1 { font-size: 1.3em; color: #667eea; margin-bottom: 15px; }
        .expense-item { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .btn-add { background: #667eea; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-add:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="nav-header">
        <div>
            <div class="page-title">Budget / Expense Calculator</div>
            <div class="page-subtitle">Track income and expenses</div>
        </div>
        <a href="../main.html" class="back-btn">← Back to Calculators</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <h1>Monthly Budget</h1>
            <form id="budgetForm">
                <div class="input-group">
                    <label for="income">Total Monthly Income ($):</label>
                    <input type="number" id="income" step="0.01" value="5000">
                </div>
                <h3 style="margin-top: 20px; color: #667eea;">Expenses</h3>
                <div id="expensesList"></div>
                <button type="button" class="btn-add" onclick="addExpense()">+ Add Expense</button>
            </form>
        </div>

        <div class="main">
            <canvas id="budgetChart" width="600" height="300"></canvas>
            <div id="results" class="results hidden">
                <h2>Budget Summary</h2>
                <div class="result-item">
                    <span class="label">Total Income:</span>
                    <span class="value">$<span id="totalIncome">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Total Expenses:</span>
                    <span class="value">$<span id="totalExpenses">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Remaining:</span>
                    <span class="value">$<span id="remaining">0.00</span></span>
                </div>
                <div id="expenseBreakdown" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        let expenseCount = 0;
        const defaultExpenses = [
            { name: 'Housing', amount: 1200 },
            { name: 'Food', amount: 500 },
            { name: 'Transportation', amount: 300 },
            { name: 'Utilities', amount: 200 }
        ];

        function initExpenses() {
            const list = document.getElementById('expensesList');
            list.innerHTML = '';
            defaultExpenses.forEach((exp, index) => {
                addExpenseItem(exp.name, exp.amount, index);
            });
            expenseCount = defaultExpenses.length;
        }

        function addExpenseItem(name = '', amount = 0, index) {
            const list = document.getElementById('expensesList');
            const div = document.createElement('div');
            div.className = 'expense-item';
            div.id = `expense-${index}`;
            div.innerHTML = `
                <input type="text" placeholder="Category" value="${name}" class="expense-name" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px;">
                <input type="number" placeholder="Amount" value="${amount}" step="0.01" class="expense-amount" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            `;
            const inputs = div.querySelectorAll('input');
            inputs.forEach(input => input.addEventListener('input', updateBudget));
            list.appendChild(div);
        }

        function addExpense() {
            addExpenseItem('', 0, expenseCount++);
            updateBudget();
        }

        function updateBudget() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const expenses = document.querySelectorAll('.expense-amount');
            let totalExpenses = 0;
            const breakdown = {};

            expenses.forEach((exp, index) => {
                const amount = parseFloat(exp.value) || 0;
                const name = document.querySelectorAll('.expense-name')[index].value || `Expense ${index + 1}`;
                totalExpenses += amount;
                breakdown[name] = amount;
            });

            const remaining = income - totalExpenses;
            document.getElementById('totalIncome').textContent = income.toFixed(2);
            document.getElementById('totalExpenses').textContent = totalExpenses.toFixed(2);
            document.getElementById('remaining').textContent = remaining.toFixed(2);

            let breakdownHTML = '<h3 style="color: #667eea; margin-bottom: 10px;">Expense Breakdown</h3>';
            Object.entries(breakdown).forEach(([name, amount]) => {
                if (amount > 0) {
                    const percent = (amount / (totalExpenses || 1)) * 100;
                    breakdownHTML += `<div style="margin-bottom: 8px;"><strong>${name}:</strong> $${amount.toFixed(2)} (${percent.toFixed(1)}%)</div>`;
                }
            });
            document.getElementById('expenseBreakdown').innerHTML = breakdownHTML;
            document.getElementById('results').classList.remove('hidden');
            
            // Draw pie chart
            drawBudgetChart(breakdown, remaining, income);
        }

        function drawBudgetChart(breakdown, remaining, income) {
            const canvas = document.getElementById('budgetChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            // Prepare data
            const labels = Object.keys(breakdown);
            const values = Object.values(breakdown);
            const total = values.reduce((a, b) => a + b, 0) + remaining;
            
            // Colors for pie
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#ff6b6b', '#ffd93d', '#6bcf7f'];
            
            // Draw title
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Budget Breakdown', width / 2, 20);
            
            // Draw pie chart
            const centerX = width / 2.5;
            const centerY = height / 2;
            const radius = 80;
            
            let currentAngle = -Math.PI / 2;
            labels.forEach((label, i) => {
                const value = values[i];
                const sliceAngle = (value / total) * 2 * Math.PI;
                
                // Draw slice
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
                ctx.closePath();
                ctx.fill();
                
                // Draw border
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                currentAngle += sliceAngle;
            });
            
            // Draw remaining slice
            if (remaining > 0) {
                const sliceAngle = (remaining / total) * 2 * Math.PI;
                ctx.fillStyle = '#e8f5e8';
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // Draw legend
            let legendY = 50;
            const legendX = width - 180;
            ctx.font = '11px Arial';
            ctx.textAlign = 'left';
            
            labels.forEach((label, i) => {
                const value = values[i];
                const percent = (value / total) * 100;
                
                ctx.fillStyle = colors[i % colors.length];
                ctx.fillRect(legendX, legendY, 12, 12);
                
                ctx.fillStyle = '#333';
                ctx.fillText(`${label}: ${percent.toFixed(1)}%`, legendX + 18, legendY + 10);
                legendY += 20;
            });
            
            if (remaining > 0) {
                const percent = (remaining / total) * 100;
                ctx.fillStyle = '#a8d5a8';
                ctx.fillRect(legendX, legendY, 12, 12);
                ctx.fillStyle = '#333';
                ctx.fillText(`Remaining: ${percent.toFixed(1)}%`, legendX + 18, legendY + 10);
            }
        }

        document.getElementById('income').addEventListener('input', updateBudget);
        initExpenses();
        updateBudget();
    </script>
</body>
</html>
