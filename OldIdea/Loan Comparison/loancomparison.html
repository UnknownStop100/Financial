<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Comparison Tool</title>
    <link rel="stylesheet" href="../common.css">
    <style>
        .sidebar h1 { font-size: 1.3em; color: #667eea; margin-bottom: 15px; }
        .loan-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        .loan-section h3 { color: #667eea; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="nav-header">
        <div>
            <div class="page-title">Loan Comparison Tool</div>
            <div class="page-subtitle">Compare multiple loan options</div>
        </div>
        <a href="../main.html" class="back-btn">← Back to Calculators</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <h1>Compare Loans</h1>
            <form id="comparisonForm">
                <div class="input-group">
                    <label for="loanAmount">Loan Amount ($):</label>
                    <input type="number" id="loanAmount" step="0.01" value="300000">
                </div>
                <div class="input-group">
                    <label for="loanTerm">Loan Term (Years):</label>
                    <input type="number" id="loanTerm" value="30">
                </div>

                <div class="loan-section">
                    <h3>Loan Option 1</h3>
                    <div class="input-group">
                        <label for="rate1">Interest Rate 1 (%):</label>
                        <input type="number" id="rate1" step="0.01" value="6">
                    </div>
                </div>

                <div class="loan-section">
                    <h3>Loan Option 2</h3>
                    <div class="input-group">
                        <label for="rate2">Interest Rate 2 (%):</label>
                        <input type="number" id="rate2" step="0.01" value="6.5">
                    </div>
                </div>

                <div class="loan-section">
                    <h3>Loan Option 3</h3>
                    <div class="input-group">
                        <label for="rate3">Interest Rate 3 (%):</label>
                        <input type="number" id="rate3" step="0.01" value="7">
                    </div>
                </div>
            </form>
        </div>

        <div class="main">
            <canvas id="comparisonChart" width="600" height="300"></canvas>
            <div id="results" class="results hidden">
                <h2>Loan Comparison</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Option</th>
                                <th>Rate</th>
                                <th>Monthly Payment</th>
                                <th>Total Interest</th>
                                <th>Total Cost</th>
                            </tr>
                        </thead>
                        <tbody id="comparisonTable"></tbody>
                    </table>
                </div>
                <div id="savings" style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 4px;"></div>
            </div>
        </div>
    </div>

    <script>
        function calculateLoan(principal, annualRate, years) {
            const monthlyRate = annualRate / 100 / 12;
            const months = years * 12;
            const monthlyPayment = principal * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            const totalPayment = monthlyPayment * months;
            const totalInterest = totalPayment - principal;
            return { monthlyPayment, totalInterest, totalCost: totalPayment };
        }

        function updateComparison() {
            const principal = parseFloat(document.getElementById('loanAmount').value) || 0;
            const years = parseFloat(document.getElementById('loanTerm').value) || 0;
            const rate1 = parseFloat(document.getElementById('rate1').value) || 0;
            const rate2 = parseFloat(document.getElementById('rate2').value) || 0;
            const rate3 = parseFloat(document.getElementById('rate3').value) || 0;

            if (principal <= 0 || years <= 0) return;

            const loan1 = calculateLoan(principal, rate1, years);
            const loan2 = calculateLoan(principal, rate2, years);
            const loan3 = calculateLoan(principal, rate3, years);

            const loans = [
                { option: 1, rate: rate1, ...loan1 },
                { option: 2, rate: rate2, ...loan2 },
                { option: 3, rate: rate3, ...loan3 }
            ];

            // Find best option
            const bestOption = loans.reduce((prev, current) => 
                prev.totalCost < current.totalCost ? prev : current
            );

            let tableHTML = '';
            loans.forEach(loan => {
                const highlight = loan.option === bestOption.option ? 'style="background-color: #e8f5e8;"' : '';
                tableHTML += `<tr ${highlight}>
                    <td><strong>Option ${loan.option}</strong></td>
                    <td>${loan.rate.toFixed(2)}%</td>
                    <td>$${loan.monthlyPayment.toFixed(2)}</td>
                    <td>$${loan.totalInterest.toFixed(2)}</td>
                    <td>$${loan.totalCost.toFixed(2)}</td>
                </tr>`;
            });

            document.getElementById('comparisonTable').innerHTML = tableHTML;

            // Show savings information
            const worst = loans.reduce((prev, current) => 
                prev.totalCost > current.totalCost ? prev : current
            );
            const savings = worst.totalCost - bestOption.totalCost;

            let savingsHTML = `<strong>Best Option: Option ${bestOption.option} at ${bestOption.rate.toFixed(2)}%</strong><br>`;
            savingsHTML += `You save $${savings.toFixed(2)} compared to Option ${worst.option}`;
            document.getElementById('savings').innerHTML = savingsHTML;
            document.getElementById('results').classList.remove('hidden');
            
            drawComparisonChart(loans);
        }

        function drawComparisonChart(loans) {
            const canvas = document.getElementById('comparisonChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            const colors = ['#667eea', '#764ba2', '#f093fb'];
            const barWidth = 60;
            const spacing = 30;
            const startX = (width - (barWidth * 3 + spacing * 2)) / 2;
            const maxCost = Math.max(...loans.map(l => l.totalCost));
            const barHeight = height - 100;
            const maxBarHeight = 200;
            
            // Title
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Total Cost Comparison', width / 2, 25);
            
            // Draw bars
            loans.forEach((loan, i) => {
                const x = startX + i * (barWidth + spacing);
                const y = height - 60;
                const scaledHeight = (loan.totalCost / maxCost) * maxBarHeight;
                
                ctx.fillStyle = colors[i];
                ctx.fillRect(x, y - scaledHeight, barWidth, scaledHeight);
                
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y - scaledHeight, barWidth, scaledHeight);
                
                // Label
                ctx.fillStyle = '#333';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Option ${loan.option}`, x + barWidth / 2, y + 20);
                ctx.font = '11px Arial';
                ctx.fillText(`${loan.rate.toFixed(2)}%`, x + barWidth / 2, y + 35);
                ctx.fillText('$' + (loan.totalCost / 1000).toFixed(0) + 'k', x + barWidth / 2, y - scaledHeight - 10);
            });
            
            // Y-axis labels
            ctx.font = '11px Arial';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 4; i++) {
                const val = maxCost * i / 4;
                const y = height - 60 - (val / maxCost) * maxBarHeight;
                ctx.fillText('$' + (val / 1000).toFixed(0) + 'k', startX - 10, y + 5);
            }
            
            // Legend - Monthly payment comparison
            const legendY = 60;
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#333';
            ctx.fillText('Monthly Payments:', width - 200, legendY);
            
            loans.forEach((loan, i) => {
                ctx.fillStyle = colors[i];
                ctx.fillRect(width - 200, legendY + 15 + i * 18, 10, 10);
                ctx.fillStyle = '#333';
                ctx.font = '10px Arial';
                ctx.fillText(`Option ${loan.option}: $${loan.monthlyPayment.toFixed(0)}`, width - 185, legendY + 23 + i * 18);
            });
        }

        document.getElementById('loanAmount').addEventListener('input', updateComparison);
        document.getElementById('loanTerm').addEventListener('input', updateComparison);
        document.getElementById('rate1').addEventListener('input', updateComparison);
        document.getElementById('rate2').addEventListener('input', updateComparison);
        document.getElementById('rate3').addEventListener('input', updateComparison);

        updateComparison();
    </script>
</body>
</html>
