<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment / ROI Calculator</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="roi.css">
</head>
<body>
    <div class="nav-header">
        <div>
            <div class="page-title">Investment / ROI Calculator</div>
            <div class="page-subtitle">Calculate investment returns and performance</div>
        </div>
        <a href="../main.html" class="back-btn">← Back to Calculators</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <h1>Investment Details</h1>
            <form id="investmentForm">
                <div class="input-group">
                    <label for="initialInvestment">Initial Investment ($):</label>
                    <input type="number" id="initialInvestment" step="0.01" value="10000">
                </div>
                <div class="input-group">
                    <label for="annualReturn">Expected Annual Return (%):</label>
                    <input type="number" id="annualReturn" step="0.01" value="8">
                </div>
                <div class="input-group">
                    <label for="investmentYears">Investment Period (Years):</label>
                    <input type="number" id="investmentYears" value="10">
                </div>
                <div class="input-group">
                    <label for="annualContribution">Annual Contribution ($):</label>
                    <input type="number" id="annualContribution" step="0.01" value="2000">
                </div>
                <div class="input-group">
                    <label for="compoundFreq">Compounding Frequency:</label>
                    <select id="compoundFreq">
                        <option value="1">Annually</option>
                        <option value="4">Quarterly</option>
                        <option value="12">Monthly</option>
                        <option value="365">Daily</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="main">
            <canvas id="investmentChart" width="600" height="300"></canvas>
            <div id="results" class="results hidden">
                <h2>Investment Results</h2>
                <div class="result-item">
                    <span class="label">Final Value:</span>
                    <span class="value">$<span id="finalValue">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Total Invested:</span>
                    <span class="value">$<span id="totalInvested">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Total Gain:</span>
                    <span class="value">$<span id="totalGain">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">ROI (%):</span>
                    <span class="value"><span id="roi">0.00</span>%</span>
                </div>
            </div>
        </div>
    </div>

    <script src="roi.js">
    </script>
</body>
</html>
