<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan / Mortgage Calculator</title>
    <link rel="stylesheet" href="../common.css">
    <style>
        .sidebar h1 { font-size: 1.3em; color: #667eea; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="nav-header">
        <div>
            <div class="page-title">Loan / Mortgage Calculator</div>
            <div class="page-subtitle">Calculate monthly payments and total interest</div>
        </div>
        <a href="../main.html" class="back-btn">← Back to Calculators</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <h1>Loan Details</h1>
            <form id="loanForm">
                <div class="input-group">
                    <label for="principal">Loan Amount ($):</label>
                    <input type="number" id="principal" step="0.01" value="300000">
                </div>
                <div class="input-group">
                    <label for="rate">Annual Interest Rate (%):</label>
                    <input type="number" id="rate" step="0.01" value="6.5">
                </div>
                <div class="input-group">
                    <label for="years">Loan Term (Years):</label>
                    <input type="number" id="years" value="30">
                </div>
                <div class="input-group">
                    <label for="loanType">Loan Type:</label>
                    <select id="loanType">
                        <option value="mortgage">Mortgage (Home Loan)</option>
                        <option value="auto">Auto Loan</option>
                        <option value="personal">Personal Loan</option>
                        <option value="student">Student Loan</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="main">
            <canvas id="loanChart" width="600" height="300"></canvas>
            <div id="results" class="results hidden">
                <h2>Loan Summary</h2>
                <div class="result-item">
                    <span class="label">Monthly Payment:</span>
                    <span class="value">$<span id="monthlyPayment">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Total Payment:</span>
                    <span class="value">$<span id="totalPayment">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Total Interest:</span>
                    <span class="value">$<span id="totalInterest">0.00</span></span>
                </div>
                <div class="table-wrapper">
                    <table id="amortizationTable" class="hidden">
                        <thead>
                            <tr>
                                <th>Payment #</th>
                                <th>Payment</th>
                                <th>Principal</th>
                                <th>Interest</th>
                                <th>Balance</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateLoan() {
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
            const years = parseFloat(document.getElementById('years').value) || 1;
            const months = years * 12;

            if (principal <= 0 || rate < 0 || years <= 0) return;

            const monthlyPayment = principal * (rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
            const totalPayment = monthlyPayment * months;
            const totalInterest = totalPayment - principal;

            document.getElementById('monthlyPayment').textContent = monthlyPayment.toFixed(2);
            document.getElementById('totalPayment').textContent = totalPayment.toFixed(2);
            document.getElementById('totalInterest').textContent = totalInterest.toFixed(2);
            document.getElementById('results').classList.remove('hidden');

            // Create amortization schedule
            let balance = principal;
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            const monthlyRate = rate;

            for (let i = 1; i <= Math.min(months, 360); i++) {
                const interestPayment = balance * monthlyRate;
                const principalPayment = monthlyPayment - interestPayment;
                balance -= principalPayment;

                const row = `<tr>
                    <td>${i}</td>
                    <td>$${monthlyPayment.toFixed(2)}</td>
                    <td>$${principalPayment.toFixed(2)}</td>
                    <td>$${interestPayment.toFixed(2)}</td>
                    <td>$${Math.max(0, balance).toFixed(2)}</td>
                </tr>`;
                tableBody.innerHTML += row;
            }

            document.getElementById('amortizationTable').classList.remove('hidden');
            
            // Draw amortization chart
            drawLoanChart(principal, rate, monthlyPayment, months);
        }

        function drawLoanChart(principal, monthlyRate, monthlyPayment, months) {
            const canvas = document.getElementById('loanChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            // Calculate balance points (show yearly)
            let balance = principal;
            const balances = [balance];
            const years = [];
            
            for (let i = 1; i <= Math.min(months, 360); i++) {
                const monthlyRate = monthlyRate;
                const interestPayment = balance * monthlyRate;
                const principalPayment = monthlyPayment - interestPayment;
                balance -= principalPayment;
                if (i % 12 === 0) {
                    balances.push(Math.max(0, balance));
                    years.push(i / 12);
                }
            }
            
            // Draw axes
            const padding = 50;
            const chartWidth = width - padding - 30;
            const chartHeight = height - padding - 50;
            
            ctx.strokeStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(padding, 20);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - 30, height - padding);
            ctx.stroke();
            
            // Scale
            const maxBalance = principal;
            const xScale = chartWidth / (years.length - 1 || 1);
            const yScale = chartHeight / (maxBalance || 1);
            
            // Draw line chart
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.beginPath();
            balances.forEach((bal, i) => {
                const x = padding + i * xScale;
                const y = height - padding - bal * yScale;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Fill under line
            ctx.strokeStyle = 'rgba(102, 126, 234, 0.2)';
            ctx.fillStyle = 'rgba(102, 126, 234, 0.1)';
            ctx.lineTo(width - 30, height - padding);
            ctx.lineTo(padding, height - padding);
            ctx.fill();
            
            // Draw labels
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Loan Balance Over Time', width / 2, 15);
            
            ctx.font = '11px Arial';
            years.forEach((year, i) => {
                const x = padding + i * xScale;
                ctx.fillText(year.toFixed(0) + 'y', x, height - padding + 20);
            });
            
            ctx.textAlign = 'right';
            for (let i = 0; i <= 4; i++) {
                const val = maxBalance * i / 4;
                const y = height - padding - (val * yScale);
                ctx.fillText('$' + (val / 1000).toFixed(0) + 'k', padding - 10, y + 5);
            }
        }

        document.getElementById('principal').addEventListener('input', updateLoan);
        document.getElementById('rate').addEventListener('input', updateLoan);
        document.getElementById('years').addEventListener('input', updateLoan);
        document.getElementById('loanType').addEventListener('change', updateLoan);

        updateLoan();
    </script>
</body>
</html>
