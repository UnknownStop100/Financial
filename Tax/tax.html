<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator</title>
    <link rel="stylesheet" href="../common.css">
    <style>
        .sidebar h1 { font-size: 1.3em; color: #667eea; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="nav-header">
        <div>
            <div class="page-title">Tax Calculator</div>
            <div class="page-subtitle">Estimate federal income tax</div>
        </div>
        <a href="../main.html" class="back-btn">← Back to Calculators</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <h1>Tax Info</h1>
            <form id="taxForm">
                <div class="input-group">
                    <label for="grossIncome">Gross Income ($):</label>
                    <input type="number" id="grossIncome" step="0.01" value="75000">
                </div>
                <div class="input-group">
                    <label for="filingStatus">Filing Status:</label>
                    <select id="filingStatus">
                        <option value="single">Single</option>
                        <option value="married">Married Filing Jointly</option>
                        <option value="head">Head of Household</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="standardDeduction">Standard Deduction ($):</label>
                    <input type="number" id="standardDeduction" step="0.01" value="13850">
                </div>
                <div class="input-group">
                    <label for="dependents">Number of Dependents:</label>
                    <input type="number" id="dependents" value="0">
                </div>
                <div class="input-group">
                    <label for="capitalize">Capital Gains ($):</label>
                    <input type="number" id="capitalGains" step="0.01" value="0">
                </div>
            </form>
        </div>

        <div class="main">
            <div id="results" class="results hidden">
                <h2>Tax Estimate (2024)</h2>
                <div class="result-item">
                    <span class="label">Gross Income:</span>
                    <span class="value">$<span id="displayIncome">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Standard Deduction:</span>
                    <span class="value">$<span id="displayDeduction">0.00</span></span>
                </div>
                <div class="result-item">
                    <span class="label">Taxable Income:</span>
                    <span class="value">$<span id="taxableIncome">0.00</span></span>
                </div>
                <div class="result-item\">\n                    <span class=\"label\">Estimated Tax:</span>\n                    <span class=\"value\">$<span id=\"estimatedTax\">0.00</span></span>\n                </div>\n                <div class=\"result-item\">\n                    <span class=\"label\">Effective Tax Rate:</span>\n                    <span class=\"value\"><span id=\"effectiveRate\">0.00</span>%</span>\n                </div>\n                <div class=\"result-item\">\n                    <span class=\"label\">After-Tax Income:</span>\n                    <span class=\"value\">$<span id=\"afterTaxIncome\">0.00</span></span>\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <script>\n        // 2024 Tax brackets for single filers\n        const taxBrackets = {\n            'single': [\n                { min: 0, max: 11000, rate: 0.10 },\n                { min: 11000, max: 44725, rate: 0.12 },\n                { min: 44725, max: 95375, rate: 0.22 },\n                { min: 95375, max: 182100, rate: 0.24 },\n                { min: 182100, max: 231250, rate: 0.32 },\n                { min: 231250, max: 578125, rate: 0.35 },\n                { min: 578125, max: Infinity, rate: 0.37 }\n            ],\n            'married': [\n                { min: 0, max: 22000, rate: 0.10 },\n                { min: 22000, max: 89075, rate: 0.12 },\n                { min: 89075, max: 190750, rate: 0.22 },\n                { min: 190750, max: 364200, rate: 0.24 },\n                { min: 364200, max: 462500, rate: 0.32 },\n                { min: 462500, max: 693750, rate: 0.35 },\n                { min: 693750, max: Infinity, rate: 0.37 }\n            ],\n            'head': [\n                { min: 0, max: 15675, rate: 0.10 },\n                { min: 15675, max: 59425, rate: 0.12 },\n                { min: 59425, max: 95375, rate: 0.22 },\n                { min: 95375, max: 182100, rate: 0.24 },\n                { min: 182100, max: 231250, rate: 0.32 },\n                { min: 231250, max: 578125, rate: 0.35 },\n                { min: 578125, max: Infinity, rate: 0.37 }\n            ]\n        };\n\n        function calculateTax(income, status) {\n            const brackets = taxBrackets[status];\n            let tax = 0;\n            for (let bracket of brackets) {\n                if (income > bracket.min) {\n                    const taxableInBracket = Math.min(income, bracket.max) - bracket.min;\n                    tax += taxableInBracket * bracket.rate;\n                }\n            }\n            return tax;\n        }\n\n        function updateTax() {\n            const income = parseFloat(document.getElementById('grossIncome').value) || 0;\n            const status = document.getElementById('filingStatus').value;\n            const deduction = parseFloat(document.getElementById('standardDeduction').value) || 0;\n            const dependents = parseInt(document.getElementById('dependents').value) || 0;\n\n            const taxableIncome = Math.max(0, income - deduction);\n            const tax = calculateTax(taxableIncome, status);\n            const childCredit = dependents * 2000;\n            const netTax = Math.max(0, tax - childCredit);\n            const effectiveRate = (netTax / income) * 100;\n            const afterTax = income - netTax;\n\n            document.getElementById('displayIncome').textContent = income.toFixed(2);\n            document.getElementById('displayDeduction').textContent = deduction.toFixed(2);\n            document.getElementById('taxableIncome').textContent = taxableIncome.toFixed(2);\n            document.getElementById('estimatedTax').textContent = netTax.toFixed(2);\n            document.getElementById('effectiveRate').textContent = effectiveRate.toFixed(2);\n            document.getElementById('afterTaxIncome').textContent = afterTax.toFixed(2);\n            document.getElementById('results').classList.remove('hidden');\n        }\n\n        document.getElementById('grossIncome').addEventListener('input', updateTax);\n        document.getElementById('filingStatus').addEventListener('change', updateTax);\n        document.getElementById('standardDeduction').addEventListener('input', updateTax);\n        document.getElementById('dependents').addEventListener('input', updateTax);\n\n        updateTax();\n    </script>\n</body>\n</html>
